<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🛒 Shopping Cart - State + Persistence</title>
  <style>
    :root { --bg: #f8fafc; --card: #fff; --primary: #3b82f6; --success: #10b981; --danger: #ef4444; }
    body { font-family: system-ui; background: var(--bg); padding: 2rem; }
    .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; }
    .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    
    /* Products */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .product { border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; text-align: center; }
    .product-img { width: 100%; height: 120px; background: #f1f5f9; border-radius: 6px; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .product-name { font-weight: 600; margin: 0.5rem 0; }
    .product-price { color: var(--primary); font-weight: bold; }
    .btn-add { background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin-top: 0.5rem; width: 100%; }
    
    /* Cart */
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .cart-count { background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.9rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #e2e8f0; }
    .cart-item:last-child { border-bottom: none; }
    .quantity-controls { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn { width: 28px; height: 28px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer; }
    .cart-total { font-size: 1.25rem; font-weight: bold; text-align: right; margin-top: 1rem; padding-top: 1rem; border-top: 2px solid #e2e8f0; }
    .btn-clear { background: var(--danger); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin-top: 1rem; width: 100%; }
    
    .empty-cart { text-align: center; color: #94a3b8; padding: 2rem; }
    
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;margin-bottom:2rem">🛒 Shopping Cart</h1>
  
  <div class="container">
    <!-- Products Section -->
    <div class="card">
      <h2>Products</h2>
      <div class="product-grid" id="productsGrid"></div>
    </div>
    
    <!-- Cart Section -->
    <div class="card">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <div id="cartItems"></div>
      <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
      <button class="btn-clear" onclick="clearCart()">🗑️ Clear Cart</button>
    </div>
  </div>

  <script>
    // 🔹 State Management
    const STORAGE_KEY = 'shopping_cart_v1';
    
    const state = {
      products: [
        { id: 1, name: "Laptop", price: 999, emoji: "💻" },
        { id: 2, name: "Phone", price: 699, emoji: "📱" },
        { id: 3, name: "Headphones", price: 199, emoji: "🎧" },
        { id: 4, name: "Watch", price: 299, emoji: "⌚" },
        { id: 5, name: "Tablet", price: 449, emoji: "📟" },
        { id: 6, name: "Camera", price: 549, emoji: "📷" }
      ],
      cart: [] // { productId, quantity }
    };

    // 🔹 Storage Helpers
    const saveCart = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state.cart));
    const loadCart = () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      state.cart = saved ? JSON.parse(saved) : [];
    };

    // 🔹 Cart Operations
    function addToCart(productId) {
      const existing = state.cart.find(item => item.productId === productId);
      if (existing) {
        existing.quantity++;
      } else {
        state.cart.push({ productId, quantity: 1 });
      }
      saveCart();
      renderAll();
    }

    function updateQuantity(productId, delta) {
      const item = state.cart.find(i => i.productId === productId);
      if (!item) return;
      
      item.quantity += delta;
      if (item.quantity <= 0) {
        state.cart = state.cart.filter(i => i.productId !== productId);
      }
      saveCart();
      renderAll();
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(i => i.productId !== productId);
      saveCart();
      renderAll();
    }

    function clearCart() {
      if (confirm('Clear entire cart?')) {
        state.cart = [];
        saveCart();
        renderAll();
      }
    }

    // 🔹 Calculations
    function getProduct(id) {
      return state.products.find(p => p.id === id);
    }
    function getCartTotal() {
      return state.cart.reduce((total, item) => {
        const product = getProduct(item.productId);
        return total + (product.price * item.quantity);
      }, 0);
    }
    function getCartCount() {
      return state.cart.reduce((count, item) => count + item.quantity, 0);
    }

    // 🔹 Rendering
    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = state.products.map(product => `
        <div class="product">
          <div class="product-img">${product.emoji}</div>
          <div class="product-name">${product.name}</div>
          <div class="product-price">$${product.price.toLocaleString()}</div>
          <button class="btn-add" onclick="addToCart(${product.id})">Add to Cart</button>
        </div>
      `).join('');
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const countEl = document.getElementById('cartCount');
      const totalEl = document.getElementById('cartTotal');
      
      countEl.textContent = getCartCount();
      totalEl.textContent = getCartTotal().toFixed(2);
      
      if (state.cart.length === 0) {
        container.innerHTML = '<div class="empty-cart">🛒 Your cart is empty</div>';
        return;
      }
      
      container.innerHTML = state.cart.map(item => {
        const product = getProduct(item.productId);
        return `
          <div class="cart-item">
            <div>
              <strong>${product.name}</strong><br>
              <small>$${product.price} × ${item.quantity}</small>
            </div>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <div class="quantity-controls">
                <button class="qty-btn" onclick="updateQuantity(${item.productId}, -1)">−</button>
                <span>${item.quantity}</span>
                <button class="qty-btn" onclick="updateQuantity(${item.productId}, 1)">+</button>
              </div>
              <button onclick="removeFromCart(${item.productId})" 
                      style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.2rem">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAll() {
      renderProducts();
      renderCart();
    }

    // 🔹 Init
    document.addEventListener('DOMContentLoaded', () => {
      loadCart();
      renderAll();
    });
  </script>
</body>
</html>
